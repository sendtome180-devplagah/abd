<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التقديم على الوظيفة المطور</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            text-align: center;
            color: #007BFF;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 15px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .alert {
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
            display: none; /* مخفي افتراضياً ويظهر عند النتيجة */
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>💼 طلب التوظيف الآلي</h2>
    
    <form id="jobForm" onsubmit="evaluateApplication(event)">
        <div class="form-group">
            <label>الاسم الكريم:</label>
            <input type="text" id="name" required placeholder="أدخل اسمك الكامل">
        </div>
        
        <div class="form-group">
            <label>العمر:</label>
            <input type="number" id="age" required placeholder="مثال: 25">
        </div>

        <div class="form-group">
            <label>الشهادة العلمية:</label>
            <input type="text" id="degree" required placeholder="مثال: بكالوريوس">
        </div>

        <div class="form-group">
            <label>التخصص:</label>
            <select id="specialty">
                <option value="طب">طب</option>
                <option value="هندسة">هندسة</option>
                <option value="صيدلة">صيدلة</option>
                <option value="تخصص آخر">تخصص آخر</option>
            </select>
        </div>

        <button type="submit">تقديم الطلب وتقييمه</button>
    </form>

    <div id="resultAlert" class="alert"></div>
</div>

<script>
function evaluateApplication(event) {
    // منع الصفحة من إعادة التحميل وتفريغ الحقول
    event.preventDefault();

    // جلب القيم من العناصر
    let name = document.getElementById('name').value.trim();
    let ageRaw = document.getElementById('age').value.trim();
    let degree = document.getElementById('degree').value.trim();
    let specialty = document.getElementById('specialty').value;
    let resultAlert = document.getElementById('resultAlert');

    if (!name) name = "أيها المتقدم";

    let age = parseInt(ageRaw);
    if (isNaN(age)) {
        resultAlert.className = "alert error";
        resultAlert.innerText = "خطأ: الرجاء إدخال العمر كأرقام فقط.";
        resultAlert.style.display = "block";
        return;
    }

    // الشروط المدمجة
    let acceptedSpecialties = ["طب", "هندسة", "صيدلة"];
    let ageInvalid = age > 30;
    let specialtyInvalid = !acceptedSpecialties.includes(specialty);

    // فحص الشروط وعرض النتيجة دون تفريغ الحقول
    if (!ageInvalid && !specialtyInvalid) {
        resultAlert.className = "alert success";
        resultAlert.innerText = `🎉 أهلاً بك يا ${name}، سيتم الاتصال بك لتحديد موعد المقابلة لشهادة (${degree}) في تخصص (${specialty}).`;

        } else if (ageInvalid) {
            resultAlert.innerText = `❌ عذراً يا ${name}، لا نستطيع توظيفك لأن عمرك تجاوز 30 سنة.`;
        } else {
            resultAlert.innerText = `❌ عذراً يا ${name}، لا نستطيع توظيفك لأن تخصص (${specialty}) غير مطلوب حالياً، نحن نقبل فقط تخصصات (طب، هندسة، صيدلة).`;
        }
    }

    // إظهار صندوق النتيجة للمستخدم
    resultAlert.style.display = "block";
}
</script>

</body>
</html>
